# ─────────────────────────────────────────────────────────────────────────────
# Database migrate + seed per environment.
#
# This workflow OWNS schema migrations — they are deliberately kept OUT of the
# Vercel build (build stays `prisma generate && next build`). Vercel deploys the
# app on the same push; this job migrates the matching database in parallel.
#
# Branch → GitHub Environment → Supabase DB (free-tier, schema-separated):
#   test    → environment "test"        → nonprod project, schema `test`
#   staging → environment "staging"     → nonprod project, schema `staging`
#   main    → environment "production"  → prod project, schema `public` (reviewer)
#
# Non-prod envs share ONE Supabase project, isolated by Postgres schema (set via
# &schema=<name> in the connection URL). Prod has its own dedicated project. Each
# schema keeps an independent _prisma_migrations history.
#
# Each GitHub Environment must hold two secrets:
#   DATABASE_URL  — Supabase pooled (Supavisor transaction, :6543, pgbouncer=true,
#                   &schema=<env> for non-prod)
#   DIRECT_URL    — Supabase direct (:5432, ?schema=<env>) — used by migrate deploy
#
# Jobs self-skip when their secrets are absent (clean no-op, not a failure).
# Seeds are idempotent upserts, so re-running on every push is safe.
# ─────────────────────────────────────────────────────────────────────────────
name: DB migrate + seed

on:
  push:
    branches: [test, staging, main]

# Never let two pushes to the same branch migrate the same DB concurrently
# (avoids the migration advisory-lock race).
concurrency:
  group: db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::test environment has no DIRECT_URL secret — skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.configured == 'true'
      - run: npx prisma migrate deploy
        if: steps.check.outputs.configured == 'true'
      - run: npm run db:seed
        if: steps.check.outputs.configured == 'true'
      # Real public event lineup FIRST (it replaces all events for the org)...
      - run: npm run db:seed:events
        if: steps.check.outputs.configured == 'true'
      # ...then the test fixtures (sample ACTIVE camp + test users + orders) on
      # top — seed-test only touches its own camp, so the real events survive.
      # Net on test: real events for the public page + test data for staff QA.
      - run: npm run db:seed:test
        if: steps.check.outputs.configured == 'true'

  staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::staging environment has no DIRECT_URL secret — skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.configured == 'true'
      - run: npx prisma migrate deploy
        if: steps.check.outputs.configured == 'true'
      - run: npm run db:seed
        if: steps.check.outputs.configured == 'true'
      - run: npm run db:seed:events
        if: steps.check.outputs.configured == 'true'
      - run: npm run db:seed:test
        if: steps.check.outputs.configured == 'true'

  production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Add a required reviewer to this Environment in repo settings to gate prod
    # migrations behind a manual approval.
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::production environment has no DIRECT_URL secret — skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.configured == 'true'
      - run: npx prisma migrate deploy
        if: steps.check.outputs.configured == 'true'
      # Prod gets the dcica org + service menu ONLY. NEVER db:seed:test in prod.
      - run: npm run db:seed
        if: steps.check.outputs.configured == 'true'
